# ============================================================
# Stage 4 Configuration: Stage 2 + U-Net Graph Reasoning
# ============================================================
# Stage 3과 동일한 원칙: Stage 2 BERT를 보존하면서 U-Net만 학습
# ============================================================

experiment:
  name: "stage4_unet"
  stage: "stage4"
  seed: 42
  device: "cuda"

data:
  dataset: "docred"
  data_dir: "data/docred"
  train_file: "train_annotated.json"
  dev_file: "dev.json"
  test_file: "test.json"
  distant_file: "train_distant.json"
  meta_dir: "data/meta"
  rel2id_file: "rel2id.json"
  max_seq_length: 512
  num_relations: 97

encoder:
  model_name: "bert-base-uncased"
  hidden_size: 768
  dropout: 0.1
  use_entity_marker: false

entity_repr:
  pooling: "logsumexp"

relation_head:
  classifier_type: "atlop"
  threshold_type: "adaptive"
  fixed_threshold: 0.3
  use_evidence_head: true

evidence:
  enabled: true
  lambda_evidence: 0.1

# ── Graph Encoder (U-Net) ──
graph_encoder:
  enabled: true
  architecture: "unet"             # ← U-Net 방식
  gnn_type: "gcn"
  num_layers: 2
  hidden_dim: 768
  dropout: 0.1
  cross_sent_window: 1
  pool_ratio: 0.5                  # U-Net 전용: 노드 압축 비율

training:
  pretrain_epochs: 0
  finetune_epochs: 30
  finetune_batch_size: 4
  finetune_gradient_accumulation: 4

  # ⚠ Stage 2 BERT 보존
  encoder_lr: 1.0e-6               # 거의 freeze
  classifier_lr: 5.0e-5
  gnn_lr: 1.0e-4                   # U-Net만 적극 학습

  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  early_stopping_patience: 10

  loss_type: "atlop"
  no_relation_weight: 0.1

  load_checkpoint: "checkpoints/stage2/finetune/best_model.pt"

evaluation:
  eval_during_training: true
  eval_steps: 500
  metric: "micro_f1"
  compute_evidence_f1: true

output:
  save_dir: "checkpoints/stage4"
  log_dir: "logs/stage4"
  save_best_only: true