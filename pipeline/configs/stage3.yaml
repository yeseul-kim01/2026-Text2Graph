# ============================================================
# Stage 3 Configuration: Stage 2 + Graph Reasoning (GAIN-lite)
# ============================================================
# 핵심 변경: Stage 2 체크포인트에서 이어서 학습
# ⚠ Stage 3의 가장 큰 실패 원인: encoder가 GNN noise에 의해 망가지는 것
# 해결: encoder를 freeze하거나 매우 낮은 lr을 사용
# ============================================================

experiment:
  name: "stage3_gain_lite"
  stage: "stage3"
  seed: 42
  device: "cuda"

data:
  dataset: "docred"
  data_dir: "data/docred"
  train_file: "train_annotated.json"
  dev_file: "dev.json"
  test_file: "test.json"
  distant_file: "train_distant.json"
  meta_dir: "data/meta"
  rel2id_file: "rel2id.json"
  max_seq_length: 512
  num_relations: 97

encoder:
  model_name: "bert-base-uncased"
  hidden_size: 768
  dropout: 0.1
  use_entity_marker: false

entity_repr:
  pooling: "logsumexp"

relation_head:
  classifier_type: "atlop"
  threshold_type: "adaptive"
  fixed_threshold: 0.3
  use_evidence_head: true

evidence:
  enabled: true
  lambda_evidence: 0.1
  teacher_signal_dir: "checkpoints/stage3/teacher"

# ── Graph Encoder (GAIN-lite) ──
graph_encoder:
  enabled: true
  architecture: "gain"          # gain | unet
  gnn_type: "gcn"               # gcn | gat
  num_layers: 1                 # 1-layer로 시작 (oversmoothing 방지)
  hidden_dim: 768
  dropout: 0.1
  cross_sent_window: 1
  residual_alpha: 0.2           # graph 영향을 약하게 (0.2 = 20%만)

training:
  pretrain_epochs: 0            # Stage 3에서는 distant pre-train 안 함
  finetune_epochs: 30
  finetune_batch_size: 4
  finetune_gradient_accumulation: 4

  # ⚠ [핵심 수정] Encoder LR을 극도로 낮추거나 0으로
  # Stage 2에서 최적화된 BERT 가중치를 보존하기 위해
  # GNN만 학습하고 BERT는 거의 안 건드림
  encoder_lr: 1.0e-6            # 거의 freeze (기존 2e-5의 1/20)
  classifier_lr: 5.0e-5         # classifier도 조금 낮춤
  gnn_lr: 1.0e-4                # GNN만 적극적으로 학습

  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  early_stopping_patience: 10

  loss_type: "atlop"
  no_relation_weight: 0.1

  # Stage 2 best model에서 이어서 학습
  load_checkpoint: "checkpoints/stage2/finetune/best_model.pt"

evaluation:
  eval_during_training: true
  eval_steps: 500
  metric: "micro_f1"
  compute_evidence_f1: true

output:
  save_dir: "checkpoints/stage3"
  log_dir: "logs/stage3"
  save_best_only: true