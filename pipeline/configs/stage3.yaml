# ============================================================
# Stage 3 Configuration: Stage 2 + Graph Reasoning (GAIN-lite)
# ============================================================
# 핵심 변경: Stage 2 체크포인트에서 이어서 학습
# ⚠ Stage 3의 가장 큰 실패 원인: encoder가 GNN noise에 의해 망가지는 것
# 해결: encoder를 freeze하거나 매우 낮은 lr을 사용
# ============================================================

experiment:
  name: "stage3_gain_lite"
  stage: "stage3"
  seed: 42
  device: "cuda"

data:
  dataset: "docred"
  data_dir: "data/docred"
  train_file: "train_annotated.json"
  dev_file: "dev.json"
  test_file: "test.json"
  distant_file: "train_distant.json"
  meta_dir: "data/meta"
  rel2id_file: "rel2id.json"
  max_seq_length: 512
  num_relations: 97

encoder:
  model_name: "bert-base-uncased"
  hidden_size: 768
  dropout: 0.1
  use_entity_marker: false

entity_repr:
  pooling: "logsumexp"

relation_head:
  classifier_type: "atlop"
  threshold_type: "adaptive"
  fixed_threshold: 0.3
  use_evidence_head: true

evidence:
  enabled: true
  lambda_evidence: 0.1
  teacher_signal_dir: "checkpoints/stage3/teacher"

# ── Graph Encoder (GAIN-lite) ──
graph_encoder:
  enabled: true
  architecture: "gain"
  gnn_type: "gcn"
  num_layers: 2
  hidden_dim: 768
  dropout: 0.1
  cross_sent_window: 2
  residual_alpha: 0.1

training:
  pretrain_epochs: 0
  finetune_epochs: 20
  finetune_batch_size: 4
  finetune_gradient_accumulation: 4

  encoder_lr: 0.0
  classifier_lr: 5.0e-5
  gnn_lr: 1.0e-4

  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  early_stopping_patience: 4

  loss_type: "atlop"
  no_relation_weight: 0.1
  load_checkpoint: "checkpoints/stage2/finetune/best_model.pt"

evaluation:
  eval_during_training: true
  eval_steps: 500
  metric: "micro_f1"
  compute_evidence_f1: true

output:
  save_dir: "checkpoints/stage3"
  log_dir: "logs/stage3"
  save_best_only: true