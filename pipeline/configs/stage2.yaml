# ============================================================
# Stage 2 Configuration: ATLOP + DREEAM 강화
# 역할: LogSumExp Pooling + Adaptive Threshold + Evidence Head
# 변경점: entity_repr.pooling, relation_head, evidence 설정
# 사용법: python scripts/train.py --config configs/stage2.yaml
# ============================================================
# ============================================================
# Stage 2 Configuration: ATLOP + DREEAM 강화
# 역할: LogSumExp Pooling + Adaptive Threshold + Evidence Head
# 변경점: entity_repr.pooling, relation_head, evidence 설정
# 사용법: python scripts/train.py --config configs/stage2.yaml
# ============================================================
experiment:
  name: "stage2_atlop_dreeam_resume_from_pretrain"
  stage: "stage2"
  seed: 42
  device: "cuda:0"

data:
  dataset: "docred"
  data_dir: "data/docred"
  train_file: "train_annotated.json"
  dev_file: "dev.json"
  test_file: "test.json"
  distant_file: "train_distant.json"
  meta_dir: "data/meta"
  rel2id_file: "rel2id.json"
  max_seq_length: 512
  num_relations: 97

encoder:
  model_name: "bert-base-uncased"
  hidden_size: 768
  use_entity_marker: false

entity_repr:
  pooling: "logsumexp"

relation_head:
  classifier_type: "atlop"
  threshold_type: "adaptive"
  use_evidence_head: true

evidence:
  enabled: true
  lambda_evidence: 0.1
  teacher_signal_dir: "checkpoints/stage2/teacher"

graph_encoder:
  enabled: false

training:
  teacher_epochs: 30

  # 이미 저장된 pretrain best를 사용할 거라 pretrain은 끔
  pretrain_epochs: 0
  pretrain_batch_size: 4
  pretrain_gradient_accumulation: 1

  finetune_epochs: 30
  finetune_batch_size: 4
  finetune_gradient_accumulation: 1

  encoder_lr: 2.0e-5
  classifier_lr: 1.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.06
  max_grad_norm: 1.0

  loss_type: "atlop"
  no_relation_weight: 0.1

  # 저장된 pretrain best에서 시작
  load_checkpoint: "checkpoints/stage2/pretrain/best_model.pt"

evaluation:
  eval_during_training: true
  eval_steps: 500
  metric: "micro_f1"
  compute_evidence_f1: true

output:
  save_dir: "checkpoints/stage2"
  log_dir: "logs/stage2"
  save_best_only: true