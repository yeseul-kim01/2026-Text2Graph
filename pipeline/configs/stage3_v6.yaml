# ============================================================
# Stage 3 Configuration: Stage 2 + Graph Reasoning (GAIN-lite)
# Version: v6 (Imbalance + Threshold tuning)
# ============================================================

experiment:
  name: "stage3_gain_lite_v6"
  stage: "stage3"
  seed: 42
  device: "cuda"

data:
  dataset: "docred"
  data_dir: "data/docred"
  train_file: "train_annotated.json"
  dev_file: "dev.json"
  test_file: "test.json"
  distant_file: "train_distant.json"
  meta_dir: "data/meta"
  rel2id_file: "rel2id.json"
  max_seq_length: 512
  num_relations: 97

encoder:
  model_name: "bert-base-uncased"
  hidden_size: 768
  dropout: 0.1
  use_entity_marker: false

entity_repr:
  pooling: "logsumexp"

relation_head:
  classifier_type: "atlop"
  threshold_type: "adaptive"
  fixed_threshold: 0.4        # [변경점]
  use_evidence_head: true

evidence:
  enabled: true
  lambda_evidence: 0.1
  teacher_signal_dir: "checkpoints/stage3/teacher"

# ── Graph Encoder (GAIN-lite) ──
graph_encoder:
  enabled: true
  architecture: "gain"
  gnn_type: "gat"
  num_layers: 1
  hidden_dim: 768
  dropout: 0.1
  cross_sent_window: 1
  residual_alpha: 0.05
  num_heads: 4

training:
  pretrain_epochs: 0
  finetune_epochs: 20
  finetune_batch_size: 4
  finetune_gradient_accumulation: 4

  encoder_lr: 5.0e-7
  classifier_lr: 5.0e-5
  gnn_lr: 1.0e-4

  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  early_stopping_patience: 4

  loss_type: "atlop"
  no_relation_weight: 0.2      # [변경점]
  load_checkpoint: "checkpoints/stage2/finetune/best_model.pt"

evaluation:
  eval_during_training: true
  eval_steps: 500
  metric: "micro_f1"
  compute_evidence_f1: true

output:
  save_dir: "checkpoints/stage3_v6"   # [변경점]
  log_dir: "logs/stage3_v6"           # [변경점]
  save_best_only: true